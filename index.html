<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroll Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #scroll-container {
      height: 600vh;
      width: 100%;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    #loader.hidden {
      opacity: 0;
    }

    #loader-bar-wrap {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }

    #loader-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    #loader-text {
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div id="loader-text">Loading</div>
    <div id="loader-bar-wrap">
      <div id="loader-bar"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="scroll-container"></div>

  <script>
    // ── CONFIG ──────────────────────────────────
    const TOTAL_FRAMES  = 369;
    const FRAME_DIR     = '';          // '' = root, 'frames/' = subfolder
    const FRAME_PREFIX  = 'frame_';
    const FRAME_EXT     = '.jpg';
    const SCROLL_SPEED  = 20;          // px of scroll per frame step
    // ────────────────────────────────────────────

    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const loader    = document.getElementById('loader');
    const loaderBar = document.getElementById('loader-bar');

    const frames     = new Array(TOTAL_FRAMES);
    let loadedCount  = 0;
    let currentFrame = 0;

    function pad(n) {
      return String(n).padStart(4, '0');
    }

    function frameSrc(i) {
      return `${FRAME_DIR}${FRAME_PREFIX}${pad(i + 1)}${FRAME_EXT}`;
    }

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      drawFrame(currentFrame);
    }

    function drawFrame(index) {
      const img = frames[index];
      if (!img || !img.complete || !img.naturalWidth) return;
      const cw = canvas.width,  ch = canvas.height;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = Math.max(cw / iw, ch / ih);
      const dw = iw * scale, dh = ih * scale;
      const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(img, dx, dy, dw, dh);
    }

    function onFrameLoaded(i) {
      loadedCount++;
      loaderBar.style.width = (loadedCount / TOTAL_FRAMES * 100) + '%';
      if (i === 0) {
        resizeCanvas();
        drawFrame(0);
      }
      if (loadedCount >= TOTAL_FRAMES) {
        loader.classList.add('hidden');
      }
    }

    function preloadFrames() {
      for (let i = 0; i < TOTAL_FRAMES; i++) {
        const img = new Image();
        const idx = i;
        img.onload  = () => onFrameLoaded(idx);
        img.onerror = () => onFrameLoaded(idx);
        img.src     = frameSrc(i);
        frames[i]   = img;
      }
    }

    // ── Infinite scroll ──
    const LOOP_HEIGHT = TOTAL_FRAMES * SCROLL_SPEED;

    window.addEventListener('scroll', () => {
      let scrollY = window.scrollY;
      if (scrollY >= LOOP_HEIGHT) {
        scrollY = scrollY % LOOP_HEIGHT;
        window.scrollTo({ top: scrollY, behavior: 'instant' });
      }
      currentFrame = Math.floor(scrollY / SCROLL_SPEED) % TOTAL_FRAMES;
      drawFrame(currentFrame);
    }, { passive: true });

    // ── Init ──
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    preloadFrames();
  </script>
</body>
</html>
