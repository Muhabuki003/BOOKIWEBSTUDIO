<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroll Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      overflow-x: hidden;
    }

    /* Outer scroll container — repeat this block to make it infinite */
    #hero-scroll {
      height: 600vh;
      position: relative;
    }

    /* Sticky inner — stays fixed while you scroll through the outer div */
    #hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* The image that swaps frames */
    #hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Loading bar */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    #loader.hidden { opacity: 0; }

    #loader-text {
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #loader-bar-wrap {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }

    #loader-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div id="loader-text">Loading</div>
    <div id="loader-bar-wrap">
      <div id="loader-bar"></div>
    </div>
  </div>

  <!-- Scroll section 1 — plays frames 0 to end -->
  <div id="hero-scroll">
    <div id="hero-sticky">
      <img id="hero-img" src="frame_0001.jpg" alt="">
    </div>
  </div>

  <!-- Scroll section 2 — repeats for infinite loop -->
  <div id="hero-scroll-2" style="height:600vh; position:relative;">
    <div style="position:sticky; top:0; height:100vh; overflow:hidden;">
      <img id="hero-img-2" src="frame_0001.jpg" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">
    </div>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────
    const TOTAL_FRAMES = 369;
    const FRAME_PREFIX = 'frame_';
    const FRAME_EXT    = '.jpg';
    // ────────────────────────────────────────────

    const heroImg     = document.getElementById('hero-img');
    const heroImg2    = document.getElementById('hero-img-2');
    const heroSection = document.getElementById('hero-scroll');
    const heroSection2 = document.getElementById('hero-scroll-2');
    const loader      = document.getElementById('loader');
    const loaderBar   = document.getElementById('loader-bar');

    const frames = [];
    let loadedCount = 0;

    function pad(n) {
      return String(n).padStart(4, '0');
    }

    function frameSrc(i) {
      return `${FRAME_PREFIX}${pad(i + 1)}${FRAME_EXT}`;
    }

    // Preload all frames
    for (let i = 0; i < TOTAL_FRAMES; i++) {
      const img = new Image();
      img.src = frameSrc(i);
      img.onload = img.onerror = () => {
        loadedCount++;
        loaderBar.style.width = (loadedCount / TOTAL_FRAMES * 100) + '%';
        if (loadedCount >= TOTAL_FRAMES) {
          loader.classList.add('hidden');
        }
      };
      frames.push(img);
    }

    // Set first frame immediately
    heroImg.src = frameSrc(0);
    heroImg2.src = frameSrc(0);

    function getSectionProgress(section) {
      const rect = section.getBoundingClientRect();
      const totalScroll = section.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      return Math.max(0, Math.min(1, scrolled / totalScroll));
    }

    function updateFrames() {
      // Section 1
      const p1 = getSectionProgress(heroSection);
      const idx1 = Math.min(Math.floor(p1 * TOTAL_FRAMES), TOTAL_FRAMES - 1);
      if (frames[idx1]?.complete) heroImg.src = frames[idx1].src;

      // Section 2 (same loop, infinite feel)
      const p2 = getSectionProgress(heroSection2);
      const idx2 = Math.min(Math.floor(p2 * TOTAL_FRAMES), TOTAL_FRAMES - 1);
      if (frames[idx2]?.complete) heroImg2.src = frames[idx2].src;
    }

    window.addEventListener('scroll', updateFrames, { passive: true });
    updateFrames();
  </script>
</body>
</html>
