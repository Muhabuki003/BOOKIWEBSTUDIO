<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
    }

    /* Tall spacer — gives scroll room. 369 frames × 30px each × 10 loops */
    #spacer {
      height: 110700px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader-text {
      color: rgba(255,255,255,0.5);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #loader-bar-wrap {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      margin-top: 16px;
    }
    #loader-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div id="loader-text">Loading</div>
    <div id="loader-bar-wrap">
      <div id="loader-bar"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- This is what you scroll through -->
  <div id="spacer"></div>

  <script>
    const TOTAL  = 369;
    const PX_PER = 30; // px scrolled per frame — tweak for speed

    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const loader    = document.getElementById('loader');
    const bar       = document.getElementById('loader-bar');
    const frames    = [];
    let loaded      = 0;

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      draw(frames[current()]);
    });

    function pad(n) { return String(n).padStart(4, '0'); }

    function current() {
      return Math.floor(window.scrollY / PX_PER) % TOTAL;
    }

    function draw(img) {
      if (!img || !img.complete || !img.naturalWidth) return;
      const cw = canvas.width,  ch = canvas.height;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const s  = Math.max(cw / iw, ch / ih);
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(img, (cw - iw*s)/2, (ch - ih*s)/2, iw*s, ih*s);
    }

    window.addEventListener('scroll', () => draw(frames[current()]), { passive: true });

    // Preload
    for (let i = 0; i < TOTAL; i++) {
      const img = new Image();
      const n   = i;
      img.onload = () => {
        loaded++;
        bar.style.width = (loaded / TOTAL * 100) + '%';
        if (n === 0) draw(img);
        if (loaded === TOTAL) loader.classList.add('hidden');
      };
      img.onerror = () => { loaded++; };
      img.src = `frame_${pad(i + 1)}.jpg`;
      frames[i] = img;
    }
  </script>
</body>
</html>
