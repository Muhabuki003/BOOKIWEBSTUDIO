<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroll Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      overflow-x: hidden;
    }

    #hero-scroll {
      /* 20 full loops worth of scroll height */
      height: calc(369 * 20px * 20 + 100vh);
      position: relative;
    }

    #hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    #hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    #loader.hidden { opacity: 0; }

    #loader-text {
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #loader-bar-wrap {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }

    #loader-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div id="loader-text">Loading</div>
    <div id="loader-bar-wrap">
      <div id="loader-bar"></div>
    </div>
  </div>

  <div id="hero-scroll">
    <div id="hero-sticky">
      <img id="hero-img" src="frame_0001.jpg" alt="">
    </div>
  </div>

  <script>
    const TOTAL_FRAMES   = 369;
    const PIXELS_PER_FRAME = 20; // px of scroll per frame — lower = faster

    const heroImg     = document.getElementById('hero-img');
    const heroSection = document.getElementById('hero-scroll');
    const loader      = document.getElementById('loader');
    const loaderBar   = document.getElementById('loader-bar');

    const frames = [];
    let loadedCount = 0;

    function pad(n) { return String(n).padStart(4, '0'); }
    function frameSrc(i) { return `frame_${pad(i + 1)}.jpg`; }

    for (let i = 0; i < TOTAL_FRAMES; i++) {
      const img = new Image();
      img.src = frameSrc(i);
      img.onload = img.onerror = () => {
        loadedCount++;
        loaderBar.style.width = (loadedCount / TOTAL_FRAMES * 100) + '%';
        if (loadedCount >= TOTAL_FRAMES) loader.classList.add('hidden');
      };
      frames.push(img);
    }

    function update() {
      const rect    = heroSection.getBoundingClientRect();
      const scrolled = -rect.top;
      if (scrolled < 0) return;

      // Modulo keeps it looping forever through the section
      const idx = Math.floor(scrolled / PIXELS_PER_FRAME) % TOTAL_FRAMES;
      if (frames[idx]?.complete) heroImg.src = frames[idx].src;
    }

    window.addEventListener('scroll', update, { passive: true });
    update();
  </script>
</body>
</html>
